<!DOCTYPE html>
<html lang="{{ current_lang }}" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ _["app_title"] }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  <!-- Chart.js for financial charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-sun"></i> {{ _["solar_proposal"] }}
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> {{ _["dashboard"] }}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/projects/new"><i class="bi bi-plus-circle"></i> {{ _["new_project"] }}</a>
          </li>
        </ul>
        <!-- Language Toggle Button -->
        <div class="nav-item ms-2">
          <button class="btn btn-sm btn-outline-light" onclick="toggleLanguage()" title="{{ _['language_zh'] if current_lang == 'en' else _['language_en'] }}">
            <i class="bi bi-globe2"></i> {{ _["language_zh"] if current_lang == "zh" else _["language_en"] }}
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    function toggleLanguage() {
      const current = "{{ current_lang }}";
      const next = current === "zh" ? "en" : "zh";
      document.cookie = "lang=" + next + "; path=/; max-age=31536000";
      window.location.reload();
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
